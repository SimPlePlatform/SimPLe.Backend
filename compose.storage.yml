services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: simpleadmin
      MINIO_ROOT_PASSWORD: simpleadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - simple_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 simpleadmin simpleadmin123; do sleep 1; done;
      mc mb --ignore-existing local/simple-profile-assets-dev;
      mc anonymous set none local/simple-profile-assets-dev;
      "

volumes:
  simple_minio_data:
