services:
  auth-postgres:
    image: postgres:16-alpine
    container_name: simple-auth-postgres
    env_file:
      - ./src/SimPle.Api/.env
    ports:
      - "5432:5432"
    volumes:
      - simple_auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  simple_auth_postgres_data:
